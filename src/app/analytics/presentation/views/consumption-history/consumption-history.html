<div class="page-header">
  <div>
    <h2 class="page-title">Consumption History</h2>
    <p class="page-subtitle">Historical energy usage records for all devices.</p>
  </div>
</div>

@if (store.loading()) {
  <mat-spinner diameter="40"></mat-spinner>
}
@if (store.error()) {
  <mat-error>{{ store.error() }}</mat-error>
}

<table mat-table [dataSource]="dataSource()" class="mat-elevation-z4 history-table" matSort matSortActive="date" matSortDirection="desc">

  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
    <td mat-cell *matCellDef="let row">{{ row.date }}</td>
  </ng-container>

  <ng-container matColumnDef="deviceName">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Device</th>
    <td mat-cell *matCellDef="let row">{{ row.deviceName }}</td>
  </ng-container>

  <ng-container matColumnDef="kwh">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>KWH</th>
    <td mat-cell *matCellDef="let row">{{ row.kwh }} kWh</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
