<h1 class="title">{{ 'homes.list-title'}}</h1>
@if (store.loading()) {
  <mat-spinner diameter="40"></mat-spinner>
}
@if (store.error()) {
  <mat-error>{{ store.error() }}</mat-error>
}
<table mat-table [dataSource]="dataSource()" class="mat-elevation-z8" matSort matSortActive="id" matSortDirection="asc" matSortDisableClear>
  <!-- ID Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'homes.id'}}</th>
    <td mat-cell *matCellDef="let home"> {{ home.id }} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> {{ 'homes.name'}} </th>
    <td mat-cell *matCellDef="let home"> {{ home.name }} </td>
  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> {{'homes.actions'}}</th>
    <td mat-cell *matCellDef="let home">
      <button mat-icon-button aria-label="{{ 'homes.edit'}}" (click)="editHome(home.id)"><mat-icon>edit</mat-icon></button>
      <button mat-icon-button aria-label="{{ 'homes.delete'}}" (click)="deleteHome(home.id)"><mat-icon>delete</mat-icon></button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
<mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>

<button mat-raised-button color="primary" (click)="navigateToNew()">{{ 'homes.new'}}</button>
