<div class="form-container">
  <h2 class="form-title">{{ isEdit ? 'Edit Home' : 'New Home' }}</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="e.g. My Apartment">
      @if (form.get('name')!.touched && form.get('name')!.hasError('required')) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        @for (t of homeTypes; track t) {
          <mat-option [value]="t">{{ t | titlecase }}</mat-option>
        }
      </mat-select>
      @if (form.get('type')!.touched && form.get('type')!.hasError('required')) {
        <mat-error>Type is required</mat-error>
      }
    </mat-form-field>

    <div class="form-actions">
      <button mat-stroked-button type="button" (click)="cancel()">Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        {{ isEdit ? 'Update' : 'Create' }}
      </button>
    </div>
  </form>
</div>
