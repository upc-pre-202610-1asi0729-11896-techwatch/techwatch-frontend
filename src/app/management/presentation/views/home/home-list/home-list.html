<div class="page-header">
  <div>
    <h2 class="page-title">Homes</h2>
    <p class="page-subtitle">Manage your registered properties.</p>
  </div>
  <button mat-raised-button color="primary" (click)="navigateToNew()">Add Home</button>
</div>

@if (store.loading()) {
  <mat-spinner diameter="40"></mat-spinner>
}
@if (store.error()) {
  <mat-error>{{ store.error() }}</mat-error>
}

<table mat-table [dataSource]="dataSource()" class="mat-elevation-z4 homes-table" matSort matSortActive="id" matSortDirection="asc" matSortDisableClear>

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
    <td mat-cell *matCellDef="let home">{{ home.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let home">{{ home.name }}</td>
  </ng-container>

  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
    <td mat-cell *matCellDef="let home">{{ home.type }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let home">
      <button mat-icon-button aria-label="Edit home" (click)="editHome(home.id)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button aria-label="Delete home" (click)="deleteHome(home.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
