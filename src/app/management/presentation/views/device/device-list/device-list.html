<h1 class="title">Device List</h1>

@if (store.loading()) {
  <mat-spinner diameter="40"></mat-spinner>
}

@if (store.error()) {
  <mat-error>{{ store.error() }}</mat-error>
}

<table mat-table [dataSource]="dataDevices()" class="mat-elevation-z8" matSort matSortActive="id" matSortDirection="asc" matSortDisableClear>

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
    <td mat-cell *matCellDef="let device">{{ device.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let device">{{ device.name }}</td>
  </ng-container>

  <ng-container matColumnDef="powerWatts">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Power Watts</th>
    <td mat-cell *matCellDef="let device">{{ device.powerWatts }}</td>
  </ng-container>



  <ng-container matColumnDef="homeId">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Home</th>
    <td mat-cell *matCellDef="let device">
      {{ device.home?.name ?? 'None' }}
    </td>
  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let device">
      <button mat-icon-button aria-label="Edit device" (click)="editDevice(device.id)"> <mat-icon>edit</mat-icon>  </button>
      <button mat-icon-button aria-label="Delete device" (click)="deleteDevices(device.id)">  <mat-icon>delete</mat-icon> </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>

<button mat-raised-button color="primary" (click)="navigateToNew()">
  New Device
</button>
