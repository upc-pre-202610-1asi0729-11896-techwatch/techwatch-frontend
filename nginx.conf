server {
    # Railway auto-detects the container port and defaults to 8080, and its
    # internal network routes over IPv6 — so nginx listens on 8080 on both
    # IPv4 and IPv6 (otherwise the edge proxy returns 502).
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long-lived caching for fingerprinted static assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path is handled by Angular's router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
